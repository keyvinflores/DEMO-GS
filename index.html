<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo | Overview - Rebranding Snapdocs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        #lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0,0,0,0.92);
            backdrop-filter: blur(20px);
            align-items: center;
            justify-content: center;
            cursor: zoom-out;
        }
        #lightbox.open { display: flex; }
        #lightbox-content {
            position: relative;
            max-width: 92vw;
            max-height: 92vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #lightbox-img {
            max-width: 92vw;
            max-height: 92vh;
            border-radius: 16px;
            object-fit: contain;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
            display: none;
        }
        #lightbox-video {
            width: min(92vw, calc(92vh * 9 / 16));
            height: min(92vh, calc(92vw * 16 / 9));
            border-radius: 16px;
            border: none;
            display: none;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }
        #lightbox-close {
            position: fixed;
            top: 24px; right: 28px;
            width: 44px; height: 44px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10000;
        }
        #lightbox-close:hover {
            background: rgba(255,255,255,0.18);
            transform: scale(1.1);
        }
        .media-placeholder { cursor: zoom-in; }
        /* Overlay para hacer clickeable el iframe del video en el slide */
        .video-click-overlay {
            position: absolute;
            inset: 0;
            z-index: 6;
            cursor: zoom-in;
            background: transparent;
        }
    </style>
</head>
<body>

    <!-- LIGHTBOX -->
    <div id="lightbox">
        <button id="lightbox-close"><i class="fa-solid fa-xmark"></i></button>
        <div id="lightbox-content">
            <img id="lightbox-img" src="" alt="fullscreen">
            <iframe id="lightbox-video" src="" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <canvas id="bg-canvas"></canvas>

    <div class="ambient-glows">
        <div class="glow-orb glow-1" id="orb1"></div>
        <div class="glow-orb glow-2" id="orb2"></div>
    </div>

    <div class="presentation-frame">

        <!-- HEADER -->
        <div class="presentation-header">
            <div class="agency-logo" id="header-logo">
                <img src="https://i.ibb.co/gbS6cgdw/LOGO-GS-3-2.png" style="height: 44px; width: auto; object-fit: contain;">
            </div>
            <div class="brand-indicator" id="header-indicator">Demo | Overview</div>
        </div>

        <!-- SLIDES -->
        <div class="slides-viewport" id="viewport">

            <!-- SLIDE 1: PORTADA -->
            <div class="slide active" data-theme="grafic" data-title="Demo | Overview">
                <div style="text-align:center; max-width:850px; margin:0 auto; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%;">
                    <span class="cyber-badge">Grafic Store Presents</span>
                    <h1 class="slide-title-large" style="margin-bottom:25px; line-height:1.2;">
                        <span style="font-weight:400; opacity:0.85;">DEMO</span>
                        <span style="font-weight:300; opacity:0.4; margin:0 10px;">|</span>
                        <span style="font-weight:500;" class="text-glow-cyber">Overview</span>
                    </h1>
                    <p class="text-desc" style="max-width:650px; font-size:16px; text-align:center; margin-bottom:0;">
                        An ultra-modern conceptual ecosystem designed to redefine digital positioning, unify brand aesthetics, and streamline mortgage signing workflows.
                    </p>
                </div>
            </div>

            <!-- SLIDE 2: CRM -->
            <div class="slide" data-theme="grafic" data-title="CRM Optimization">
                <div class="slide-focused-layout">
                    <div class="focused-media-container">
                        <div class="media-placeholder">
                            <img src="https://i.ibb.co/Xrz2wTmD/CRM-2-0.jpg" alt="CRM Grafic Store" onerror="this.style.display='none';">
                        </div>
                    </div>
                </div>
            </div>

            <!-- SLIDE 3: SNAPDOCS PROPOSAL -->
            <div class="slide" data-theme="snapdocs" data-title="Snapdocs Proposal">
                <div class="slide-focused-layout">
                    <div class="focused-media-container">
                        <div class="media-placeholder" style="border-color:rgba(255,107,0,0.2);">
                            <img src="https://i.ibb.co/27Hw1ghk/SNAP.png" alt="Snapdocs Brand Identity" onerror="this.style.display='none';">
                        </div>
                    </div>
                </div>
            </div>

            <!-- SLIDE 4: FACEBOOK COVER -->
            <div class="slide" data-theme="snapdocs" data-title="Facebook Cover">
                <div class="slide-focused-layout">
                    <div class="focused-media-container">
                        <div class="media-placeholder" style="border-color:rgba(255,107,0,0.2);">
                            <img src="https://i.ibb.co/PvLNTbbC/SNAP-PORTADA-2x.jpg" alt="Portada de Facebook" onerror="this.style.display='none';">
                        </div>
                    </div>
                </div>
            </div>

            <!-- SLIDE 5: MOCKUP -->
            <div class="slide" data-theme="snapdocs" data-title="Mockup">
                <div class="slide-focused-layout">
                    <div class="focused-media-container">
                        <div class="media-placeholder" style="border-color:rgba(255,107,0,0.2);">
                            <img src="https://i.ibb.co/WNVPKm93/VISTA-PREVIA.jpg" alt="Mockup" onerror="this.style.display='none';">
                        </div>
                    </div>
                </div>
            </div>

            <!-- SLIDE 6: CARRUSEL -->
            <div class="slide" data-theme="snapdocs" data-title="Carousel">
                <div class="slide-focused-layout">
                    <div class="focused-media-container">
                        <div style="display:grid; grid-template-columns:repeat(3,1fr); gap:20px; width:100%; height:100%;">
                            <div class="media-placeholder" style="border-color:rgba(255,107,0,0.2);">
                                <img src="https://i.ibb.co/21PJw4vz/1.png" alt="Campaña 1" onerror="this.style.display='none';">
                            </div>
                            <div class="media-placeholder" style="border-color:rgba(255,107,0,0.2);">
                                <img src="https://i.ibb.co/hxghMWzP/2.png" alt="Campaña 2" onerror="this.style.display='none';">
                            </div>
                            <div class="media-placeholder" style="border-color:rgba(255,107,0,0.2);">
                                <img src="https://i.ibb.co/Psm5RkVF/3.png" alt="Campaña 3" onerror="this.style.display='none';">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- SLIDE 7: HIGHLIGHTS -->
            <div class="slide" data-theme="snapdocs" data-title="Highlights">
                <div class="slide-focused-layout">
                    <div class="focused-media-container">
                        <div class="media-placeholder" style="border-color:rgba(255,107,0,0.2);">
                            <img src="https://i.ibb.co/6pr0L7j/ICONOSS2.png" alt="Highlights" onerror="this.style.display='none';">
                        </div>
                    </div>
                </div>
            </div>

            <!-- SLIDE 8: INSTAGRAM FEED -->
            <div class="slide" data-theme="snapdocs" data-title="Instagram Feed">
                <div class="slide-focused-layout">
                    <div class="focused-media-container">
                        <div class="media-placeholder" style="border-color:rgba(255,107,0,0.2);">
                            <img src="https://i.ibb.co/S4HT1vhL/FEED-IG.jpg" alt="Instagram Feed" onerror="this.style.display='none';">
                        </div>
                    </div>
                </div>
            </div>

            <!-- SLIDE 9: VIDEO VERTICAL -->
            <div class="slide" data-theme="snapdocs" data-title="Video">
                <div class="slide-focused-layout">
                    <div style="height:90%; aspect-ratio:9/16; position:relative; margin:0 auto;">
                        <div class="media-placeholder" style="border-color:rgba(255,107,0,0.2); border-radius:20px; overflow:hidden; position:relative; width:100%; height:100%;">
                            <iframe
                                id="slide-video-iframe"
                                src="https://www.youtube.com/embed/e7B8Pl4Uk24?rel=0&modestbranding=1&controls=1"
                                title="Snapdocs Video"
                                frameborder="0"
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
                                allowfullscreen
                                style="position:absolute; top:0; left:0; width:100%; height:100%; border:none; border-radius:20px; z-index:5;">
                            </iframe>
                            <!-- overlay para lightbox — NO bloquea los controles normales del iframe -->
                            <!-- El lightbox se activa desde el botón de abajo -->
                        </div>
                        <!-- Botón fullscreen debajo del video -->
                        <button onclick="openLightbox('video','https://www.youtube.com/embed/e7B8Pl4Uk24')"
                            style="position:absolute; bottom:-38px; left:50%; transform:translateX(-50%);
                                   background:rgba(255,107,0,0.15); border:1px solid rgba(255,107,0,0.4);
                                   color:#ff6b00; padding:6px 20px; border-radius:20px; cursor:pointer;
                                   font-size:12px; font-weight:600; font-family:'Poppins',sans-serif;
                                   letter-spacing:0.5px; transition:all 0.3s;">
                            <i class="fa-solid fa-expand" style="margin-right:6px;"></i>Ver en pantalla completa
                        </button>
                    </div>
                </div>
            </div>

            <!-- SLIDE 10: CIERRE -->
            <div class="slide" data-theme="grafic" data-title="Closing">
                <div class="slide-focused-layout" style="justify-content:center; gap:24px;">
                    <div style="text-align:center;">
                        <span class="cyber-badge" style="box-shadow:0 0 25px rgba(139,92,246,0.35);">Evoluciona tu Marca hoy con:</span>
                        <h1 class="slide-title-large" style="font-size:58px; margin-bottom:25px;">
                            <span class="text-glow-cyber">Grafic Store</span>
                        </h1>
                    </div>
                </div>
            </div>

        </div>

        <!-- FOOTER -->
        <div class="presentation-footer">
            <div class="slide-counter" id="slide-num">01 / 10</div>
            <div class="progress-dots" id="dots-container"></div>
            <div class="nav-buttons">
                <button class="nav-btn" id="prev-btn"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="nav-btn" id="next-btn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>

    </div>

    <script src="app.js"></script>

    <script>
        // ── LIGHTBOX ──────────────────────────────────────────────
        const lightbox = document.getElementById('lightbox');
        const lbImg    = document.getElementById('lightbox-img');
        const lbVideo  = document.getElementById('lightbox-video');
        const lbClose  = document.getElementById('lightbox-close');

        function openLightbox(type, src) {
            lightbox.classList.add('open');
            if (type === 'img') {
                lbImg.src = src;
                lbImg.style.display = 'block';
                lbVideo.style.display = 'none';
                lbVideo.src = '';
            } else {
                lbVideo.src = src + '?autoplay=1&rel=0&modestbranding=1';
                lbVideo.style.display = 'block';
                lbImg.style.display = 'none';
                lbImg.src = '';
            }
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            lightbox.classList.remove('open');
            lbImg.src = '';
            lbVideo.src = '';
            lbImg.style.display = 'none';
            lbVideo.style.display = 'none';
            document.body.style.overflow = '';
        }

        lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
        lbClose.addEventListener('click', closeLightbox);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

        // Click en imágenes → lightbox
        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.media-placeholder img').forEach(img => {
                img.style.cursor = 'zoom-in';
                img.addEventListener('click', e => {
                    e.stopPropagation();
                    if (img.src && !img.src.includes('undefined')) openLightbox('img', img.src);
                });
            });
        });
    </script>

</body>
</html>
